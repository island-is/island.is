global:
  env:
    AUDIT_GROUP_NAME: '/island-is/audit-log'
    AWS_REGION: 'eu-west-1'
    NPM_CONFIG_UPDATE_NOTIFIER: 'false'
    PORT: '3333'
    name: 'dev'
  initContainer:
    env:
      AWS_REGION: 'eu-west-1'
      NPM_CONFIG_UPDATE_NOTIFIER: 'false'
name: 'application-system-next'
enabled: true
env:
  BFF_PROXY_TARGET: 'http://api.islandis.svc.cluster.local'
  ENVIRONMENT: 'dev'
  INTERNAL_API_URL: 'http://api.islandis.svc.cluster.local'
  LOG_LEVEL: 'info'
  NODE_OPTIONS: '--max-old-space-size=460 --enable-source-maps -r dd-trace/init'
  SERVERSIDE_FEATURES_ON: ''
grantNamespaces:
  - 'application-system'
grantNamespacesEnabled: true
healthCheck:
  liveness:
    initialDelaySeconds: 10
    path: '/liveness'
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 20
    path: '/readiness'
    timeoutSeconds: 3
hpa:
  scaling:
    metric:
      cpuAverageUtilization: 70
      nginxRequestsIrate: 5
    replicas:
      max: 3
      min: 1
httpRoute:
  primary-gw:
    hostnames:
      - 'beta.dev01.devland.is'
    parentRefs:
      - name: 'gateway-external'
        namespace: 'envoy-gateway-external'
    rules:
      - matches:
          - pathPrefix: '/umsoknir/sdf'
image:
  repository: '821090935708.dkr.ecr.eu-west-1.amazonaws.com/application-system-next'
namespace: 'application-system'
podDisruptionBudget:
  minAvailable: '50%'
  unhealthyPodEvictionPolicy: 'IfHealthyBudget'
podSecurityContext:
  fsGroup: 65534
pvcs: []
replicaCount:
  default: 1
  max: 3
  min: 1
resources:
  limits:
    cpu: '1000m'
    memory: '512Mi'
  requests:
    cpu: '200m'
    memory: '256Mi'
secrets:
  CONFIGCAT_SDK_KEY: '/k8s/configcat/CONFIGCAT_SDK_KEY'
  DD_LOGS_CLIENT_TOKEN: '/k8s/DD_LOGS_CLIENT_TOKEN'
securityContext:
  allowPrivilegeEscalation: false
  privileged: false
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: 'arn:aws:iam::013313053092:role/application-system-next'
  create: true
  name: 'application-system-next'
