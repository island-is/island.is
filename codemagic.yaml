definitions:
  base: &base
    max_build_duration: 120
    working_directory: apps/native/app
    when:
      changeset:
        includes:
          - 'apps/native/app'
    # To save on build minutes, workflows are currently triggered manually and/or once per day.
    #  default_triggers: &default_triggers
    #    events:
    #      - push
    #    branch_patterns:
    #      - pattern: "main"
    #        include: true
    #        source: true
  environment: &environment
    node: 24.10.0
    xcode: '26.0.1'
  shared_envs: &shared_envs
    XCODE_WORKSPACE: 'IslandApp.xcworkspace'
    XCODE_SCHEME: 'IslandApp'
    CM_CLONE_DEPTH: 200
    NODE_OPTIONS: '--max-old-space-size=8192'
  scripts:
    - &check_changes
      name: Check changes since last build
      working_directory: .
      script: |
        set -e

        echo "Considering changes between $CM_PREVIOUS_COMMIT and $CM_COMMIT"
        if git cat-file -e "$CM_PREVIOUS_COMMIT"^{commit} >& /dev/null; then
          notes=$(git log --pretty=format:"%s (%an)" "$CM_PREVIOUS_COMMIT".."$CM_COMMIT" -- codemagic.yaml apps/native/app)
          if [[ $notes == "" ]]; then
            echo "No changes detected in native app. Exiting."
            exit 1
          else
            echo "App changes since last build:"
            echo "$notes" | tee apps/native/app/release_notes_en-US.txt
          fi
        else
          echo "No previous commit detected. Continuing."
        fi
    - &pip_install
      name: Install distutils with pip
      script: |
        pip3 install --upgrade setuptools
        python3 -c "import distutils; print(distutils.__file__)"
    - &npm_install
      name: Install npm dependencies
      working_directory: .
      script: |
        corepack enable
        corepack prepare
        yarn install --immutable
    - &codegen
      name: Run codegen
      working_directory: .
      script: |
        yarn codegen
    - &prebuild_ios
      name: Expo prebuild for iOS
      script: |
        npx expo prebuild --platform ios --clean
    - &prebuild_android
      name: Expo prebuild for Android
      script: |
        echo $ANDROID_FIREBASE_SECRET > assets/firebase/google-services.json
        npx expo prebuild --platform android --clean
    - &cocoapods
      name: Install CocoaPods dependencies
      script: |
        cd ios && pod install
    - &set_android_location
      name: Prepare Android configuration
      script: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
    - &provisioning_profiles
      name: Set up provisioning profiles settings on Xcode project
      script: xcode-project use-profiles
    - &increment_build_number
      name: Increment build number
      script: |
        cd ios
        APP_STORE_BUILD=$(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID")
        PROJECT_BUILD=$(agvtool what-version -terse | tail -n 1)

        if [ "$PROJECT_BUILD" -gt "$APP_STORE_BUILD" ]; then
          echo "Using project build: $PROJECT_BUILD"
          echo "This may be due to a hidden/failed build in App Store Connect"
          # Keep current project build number (don't change it)
        else
          echo "Using App Store Connect build: $APP_STORE_BUILD"
          agvtool new-version -all $(($APP_STORE_BUILD + 1))
        fi
    - &build_ipa
      name: Build ipa for distribution
      script: |
        xcode-project build-ipa \
          --workspace "ios/$XCODE_WORKSPACE" \
          --scheme "$XCODE_SCHEME"
    - &get_android_version_code
      name: Get latest Android version code
      script: |
        LATEST_GOOGLE_PLAY_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME")
        if [ -z "$LATEST_GOOGLE_PLAY_BUILD_NUMBER" ]; then
            echo "Failed to get build number from Google Play"
            exit 1
        fi
        ANDROID_VERSION_CODE=$(($LATEST_GOOGLE_PLAY_BUILD_NUMBER + 1))
        echo "ANDROID_VERSION_CODE=$ANDROID_VERSION_CODE" >> $CM_ENV
        echo "Using Android version code: $ANDROID_VERSION_CODE"
    - &build_android
      name: Build Android release
      script: |
        cd android
        ./gradlew bundleRelease
    - &build_ios_simulator
      name: Build iOS simulator app (Release)
      script: |
        xcodebuild \
          -workspace "ios/$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath ios/build \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=YES

        # Zip the .app for devicecloud upload
        APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
        cd "$(dirname "$APP_PATH")"
        zip -r "$CM_BUILD_DIR/IslandApp.zip" "$(basename "$APP_PATH")"
    - &build_android_apk
      name: Build Android release APK
      script: |
        cd android
        ./gradlew assembleRelease
    - &run_devicecloud_ios
      name: Upload iOS to DeviceCloud
      script: |
        npx --yes @devicecloud.dev/dcd@latest cloud \
          "$CM_BUILD_DIR/IslandApp.zip" \
          .maestro/ \
          --apiKey "$DCD_API_KEY"
    - &run_devicecloud_android
      name: Upload Android to DeviceCloud
      script: |
        APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
        npx --yes @devicecloud.dev/dcd@latest cloud \
          "$APK_PATH" \
          .maestro/ \
          --apiKey "$DCD_API_KEY"
  publishing:
    ios_publishing: &ios_publishing
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
    android_publishing: &android_publishing
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
    slack_errors: &slack_errors
      slack:
        channel: '#team-app-builds'
        notify:
          # don't want to spam slack with 4 successful builds. Overridden in dev-app-ios.
          success: false
          failure: true

workflows:
  prod-app-ios:
    <<: *base
    name: Island.is Prod App iOS
    instance_type: mac_mini_m2
    cache: &ios_cache
      cache_paths:
        - ~/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/.yarn/cache
        - $CM_BUILD_DIR/.cache/nx
    integrations:
      app_store_connect: 'Island.is API Key'
    environment:
      <<: *environment
      ios_signing:
        distribution_type: app_store
        bundle_identifier: is.island.app
      vars:
        <<: *shared_envs
        BUNDLE_ID: 'is.island.app'
        APP_STORE_APPLE_ID: 1569828682
        APP_VARIANT: 'production'
    scripts:
      - *check_changes
      - *pip_install
      - *npm_install
      - *codegen
      - *prebuild_ios
      - *cocoapods
      - *provisioning_profiles
      - *increment_build_number
      - *build_ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      <<: *ios_publishing
      <<: *slack_errors

  dev-app-ios:
    <<: *base
    name: Island.is Dev App iOS
    instance_type: mac_mini_m2
    cache: *ios_cache
    integrations:
      app_store_connect: 'Island.is API Key'
    environment:
      <<: *environment
      ios_signing:
        distribution_type: app_store
        bundle_identifier: is.island.app.dev
      groups:
        - devicecloud
      vars:
        <<: *shared_envs
        BUNDLE_ID: 'is.island.app.dev'
        APP_STORE_APPLE_ID: 1570427360
        APP_VARIANT: 'development'
    scripts:
      - *check_changes
      - *pip_install
      - *npm_install
      - *codegen
      - *prebuild_ios
      - *cocoapods
      # E2E: build simulator app, run tests, gate store build on passing
      # - *build_ios_simulator
      # - *run_devicecloud_ios
      # Store build (only runs if e2e passed)
      - *provisioning_profiles
      - *increment_build_number
      - *build_ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $CM_BUILD_DIR/IslandApp.zip
    publishing:
      <<: *ios_publishing
      slack:
        channel: '#team-app-builds'
        notify:
          success: true
          failure: true

  prod-app-android:
    <<: *base
    name: Island.is Prod App Android
    instance_type: mac_mini_m2
    ## Switch when we have billing
    # instance_type: linux_x2
    cache: &android_cache
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/.yarn/cache
        - $CM_BUILD_DIR/.cache/nx
    environment:
      <<: *environment
      android_signing:
        - island-upload-keystore
      groups:
        - google_credentials
        - firebase_credentials
      vars:
        <<: *shared_envs
        PACKAGE_NAME: 'is.island.app'
        APP_VARIANT: 'production'
    scripts:
      - *check_changes
      - *pip_install
      - *npm_install
      - *codegen
      - *get_android_version_code
      - *prebuild_android
      - *set_android_location
      - *build_android
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      <<: *android_publishing
      <<: *slack_errors

  dev-app-android:
    <<: *base
    name: Island.is Dev App Android
    instance_type: mac_mini_m2
    ## Switch when we have billing
    # instance_type: linux_x2
    cache: *android_cache
    environment:
      <<: *environment
      android_signing:
        - island-upload-keystore
      groups:
        - google_credentials
        - firebase_credentials_dev
        - devicecloud
      vars:
        <<: *shared_envs
        PACKAGE_NAME: 'is.island.app.dev'
        APP_VARIANT: 'development'
    scripts:
      - *check_changes
      - *pip_install
      - *npm_install
      - *codegen
      - *prebuild_android
      - *set_android_location
      # E2E: build APK, run tests, gate store build on passing
      - *build_android_apk
      - *run_devicecloud_android
      # Store build (only runs if e2e passed, fast due to Gradle cache)
      - *get_android_version_code
      - *build_android
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      <<: *android_publishing
      <<: *slack_errors
