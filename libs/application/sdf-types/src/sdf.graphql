scalar JSON

enum ActionType {
  NEXT_PAGE
  PREV_PAGE
  SUBMIT
  REFETCH
  VALIDATE
}

enum ButtonVariant {
  PRIMARY
  GHOST
  SUBTLE
  REJECT
  SIGN
}

type Screen {
  applicationId: String!
  header: Header!
  stepper: Stepper!
  page: Page!
  footer: Footer!
  locale: String!
}

type Header {
  title: String!
  description: String
}

type Stepper {
  sections: [StepperSection!]!
  activeSectionIndex: Int!
  activeSubSectionIndex: Int!
}

type StepperSection {
  id: String!
  title: String!
  isComplete: Boolean!
  children: [StepperSubSection!]!
}

type StepperSubSection {
  id: String!
  title: String!
}

type Footer {
  buttons: [FooterButton!]!
  canGoBack: Boolean!
}

type FooterButton {
  id: String!
  text: String!
  variant: ButtonVariant!
  actionType: ActionType!
}

type Page {
  id: String!
  index: Int!
  sectionIndex: Int!
  subSectionIndex: Int!
  components: [Component!]!
  errors: [ValidationError!]!
}

type ValidationError {
  componentId: String!
  message: String!
}

union Component =
    TextField
  | SearchField
  | SelectField
  | DataTableField
  | RadioField
  | CheckboxField
  | DateField
  | FileUploadField
  | PhoneField
  | NationalIdField
  | CompanySearchField
  | AsyncSelectField
  | SubmitField
  | DividerField
  | DescriptionField
  | KeyValueField
  | AlertMessageField
  | LinkField
  | RedirectToServicePortalField
  | PaymentPendingField
  | MessageWithLinkButtonField
  | ExpandableDescriptionField
  | AccordionField
  | ActionCardListField
  | TableRepeaterField
  | StaticTableField
  | HiddenInputField
  | HiddenInputWithWatchedValueField
  | FindVehicleField
  | DisplayField
  | ImageField
  | BankAccountField
  | SliderField
  | ExternalDataProviderField
  | TitleField
  | PaginatedSearchableTableField
  | NationalIdWithNameField
  | FieldsRepeaterField
  | OverviewField
  | VehiclePermnoWithInfoField
  | InformationCardField
  | PaymentChargeOverviewField
  | PdfLinkButtonField
  | CopyLinkField
  | RepeaterComponent
  | CustomComponent

type RepeaterComponent {
  id: String!
  arrayPath: String!
  addItemLabel: String!
  removeItemLabel: String
  minItems: Int
  maxItems: Int
  items: [[Component!]!]!
}

type CustomComponent {
  componentName: String!
  props: String!
}

type TextField {
  id: String!
  label: String!
  placeholder: String
  required: Boolean!
  disabled: Boolean!
  maxLength: Int
  defaultValue: String
  inputVariant: String
  textareaRows: Int
  inputBackgroundColor: String
  readOnly: Boolean
  rightAlign: Boolean
  textFormat: String
  textSuffix: String
  showMaxLength: Boolean
  thousandSeparator: Boolean
  allowNegative: Boolean
  textNumberMin: Int
  textNumberMax: Int
  textStep: String
  width: ComponentWidth
  clientShowWhen: JSON
}

type SelectField {
  id: String!
  label: String!
  placeholder: String
  required: Boolean!
  disabled: Boolean!
  isMulti: Boolean!
  options: [SelectOption!]!
  onSelectRefetchTemplateApis: [String!]
  refetchTargets: [String!]
