enum ComponentWidth {
  FULL
  HALF
}

union ClientCondition = SingleClientCondition | MultiClientCondition

type SingleClientCondition {
  questionId: String!
  comparator: String!
  value: String!
}

type MultiClientCondition {
  on: ConditionOperator!
  checks: [SingleClientCondition!]!
}

enum ConditionOperator {
  ALL
  ANY
}
