query ShipRegistrySailorCertificates {
  shipRegistrySailorCertificates {
    schoolCertificates {
      id
      title
      validToDate
      school
      issueDate
    }
    rightCertificates {
      id
      type
      rightsCategories
      validToDate
      certificateNumber
      issueDate
    }
  }
}
