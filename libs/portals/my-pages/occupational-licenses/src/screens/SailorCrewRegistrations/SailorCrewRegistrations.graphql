query ShipRegistrySailorCrewRegistrations(
  $filters: ShipRegistrySeaServiceBookFilterInput
) {
  shipRegistrySailor {
    seaServiceBook(filters: $filters) {
      id
      shipName
      shipRegistrationNumber
      rank
      rankCode
      startDate
      endDate
      numberOfDays
    }
    certificates {
      registrationExemptions {
        id
        shipName
        shipRegistrationNo
        rank
        advertised
        exemptionLowerStatus
        dateFrom
        dateTo
        numberOfDays
      }
      maritimeBooks {
        id
        type
        dateFrom
        dateTo
      }
    }
  }
}
