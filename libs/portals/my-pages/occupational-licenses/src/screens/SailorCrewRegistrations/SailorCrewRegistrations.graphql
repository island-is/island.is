query ShipRegistrySailorCrewRegistrations(
  $input: ShipRegistrySeaServiceBookInput!
) {
  shipRegistrySailor {
    seaServiceBook(input: $input) {
      data {
        id
        shipName
        shipRegistrationNumber
        rank
        startDate
        endDate
        numberOfDays
      }
      totalCount
      pageInfo {
        hasNextPage
      }
    }
    certificates {
      registrationExemptions {
        id
        shipName
        shipRegistrationNo
        rank
        advertised
        exemptionLowerStatus
        dateFrom
        dateTo
        numberOfDays
      }
      maritimeBooks {
        id
        type
        dateFrom
        dateTo
      }
    }
  }
}
