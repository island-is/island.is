query FarmerLandSubsidies($input: FarmerLandSubsidiesInput!) {
  farmerLandSubsidies(input: $input) {
    data {
      id
      paymentDate
      contract
      paymentCategory
      grossAmount
      offset
      netPaid
      name
      nationalId
      units
      unitPrice
    }
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    filterOptions {
      contracts {
        id
        name
      }
      paymentCategories {
        id
        name
      }
    }
  }
}
