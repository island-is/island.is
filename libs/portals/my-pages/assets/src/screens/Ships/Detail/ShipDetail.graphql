fragment LocalizedValue on ShipRegistryLocalizedValue {
  label
  value
  unit
}

query ShipDetail($input: ShipRegistryUserShipInput!) {
  shipRegistryUserShip(input: $input) {
    id
    registrationNumber
    name
    region {
      ...LocalizedValue
    }
    usageType {
      ...LocalizedValue
    }
    imoNumber {
      ...LocalizedValue
    }
    constructionYear {
      ...LocalizedValue
    }
    constructionStation {
      ...LocalizedValue
    }
    hullMaterial {
      ...LocalizedValue
    }
    classificationSociety {
      ...LocalizedValue
    }
    phoneOnBoard {
      ...LocalizedValue
    }
    measurements {
      length {
        ...LocalizedValue
      }
      maxLength {
        ...LocalizedValue
      }
      width {
        ...LocalizedValue
      }
      depth {
        ...LocalizedValue
      }
      bruttoGrossTonnage {
        ...LocalizedValue
      }
      bruttoWeight {
        ...LocalizedValue
      }
    }
    fishery {
      name {
        ...LocalizedValue
      }
      address {
        ...LocalizedValue
      }
      municipality {
        ...LocalizedValue
      }
      phoneNo {
        ...LocalizedValue
      }
    }
    engines {
      name {
        ...LocalizedValue
      }
      year {
        ...LocalizedValue
      }
      power {
        ...LocalizedValue
      }
    }
    certificates {
      name
      status
      issueDate
      validToDate
      extensionDate
    }
  }
}
