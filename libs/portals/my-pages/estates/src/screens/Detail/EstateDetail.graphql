query EstateDetail($input: EstatesCaseInput!) {
  estate(input: $input) {
    id
    caseId
    deceased {
      title
      name
      nationalId
      dateOfDeath
    }
    representative {
      name
      nationalId
      text
    }
    estateManager {
      name
      nationalId
    }
    status {
      code
      text
      isOpen
    }
    nextSteps {
      code
      description
      detailedDescription
      stepStatus {
        code
        text
      }
      action {
        type
        label
        url
        method
      }
    }
    deadline {
      description
      detailedDescription
      dueDate
      daysRemaining
    }
    progress {
      title
      steps {
        order
        code
        state
        completedDate
        description
        information
        action {
          type
          label
          url
          method
        }
      }
    }
    inheritors {
      name
      nationalId
      relation {
        code
        text
      }
    }
    documents {
      name
      documentTypeDescription
      documentDate
      availability
      islandIsDocumentId
      requestAction {
        type
        label
        url
        method
      }
    }
  }
}
