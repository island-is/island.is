query GetCustomerChargeType {
  getCustomerChargeType {
    chargeType {
      id
      name
    }
  }
}

query GetCustomerRecords($input: GetCustomerRecordsPagedInput!) {
  getCustomerRecordsPaged(input: $input) {
    data {
      createDate
      createTime
      valueDate
      performingOrganization
      collectingOrganization
      chargeType
      itemCode
      chargeItemSubject
      periodType
      period
      amount
      category
      subCategory
      actionCategory
      reference
      referenceToLevy
      accountReference
    }
    pageInfo {
      hasNextPage
      startCursor
    }
  }
}
