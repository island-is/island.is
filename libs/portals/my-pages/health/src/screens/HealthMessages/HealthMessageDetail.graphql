query GetHealthMessageDetail($id: String!) {
  healthDirectorateHealthMessage(id: $id) {
    id
    title
    status
    isStarred
    isArchived
    patientCanReply
    isRead
    lastSenderGroupName
    messages {
      id
      direction
      messageSentAt
      messageTextContent
      senderGroupName
      attachments {
        id
        fileName
        description
      }
    }
  }
}

mutation MarkHealthMessageAsRead($id: String!) {
  healthDirectorateMarkHealthMessageAsRead(id: $id)
}

mutation StarHealthMessageDetail($id: String!) {
  healthDirectorateStarHealthMessage(id: $id)
}

mutation UnstarHealthMessageDetail($id: String!) {
  healthDirectorateUnstarHealthMessage(id: $id)
}

mutation ArchiveHealthMessageDetail($id: String!) {
  healthDirectorateArchiveHealthMessage(id: $id)
}

mutation UnarchiveHealthMessageDetail($id: String!) {
  healthDirectorateUnarchiveHealthMessage(id: $id)
}

mutation ReplyToHealthMessage(
  $id: String!
  $input: HealthDirectorateReplyToMessageInput!
) {
  healthDirectorateReplyToHealthMessage(id: $id, input: $input) {
    id
    messages {
      id
      direction
      messageSentAt
      messageTextContent
      senderGroupName
      attachments {
        id
        fileName
        description
      }
    }
  }
}
