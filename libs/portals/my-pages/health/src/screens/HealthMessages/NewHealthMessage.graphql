query GetHealthMessagingRecipientsForNew($locale: String) {
  healthDirectorateHealthMessagingRecipients(locale: $locale) {
    nodeId
    groupId
    name
    allowsMessaging
    allowedMessageTypes {
      patientInitiatedTypeCode
      title
      isCertificate
    }
  }
}

mutation CreateHealthMessage($input: HealthDirectorateCreateMessageInput!) {
  healthDirectorateCreateHealthMessage(input: $input) {
    id
  }
}
