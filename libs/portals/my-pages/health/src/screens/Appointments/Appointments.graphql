query getAppointments(
  $from: DateTime
  $status: [HealthDirectorateAppointmentStatus!]
  $page: Int
  $pageSize: Int
  $search: String
) {
  healthDirectorateAppointments(
    from: $from
    status: $status
    page: $page
    pageSize: $pageSize
    search: $search
  ) {
    data {
      __typename
      id
      title
      date
      duration
      modality
      practitioners
      assignees {
        type
        name
      }
      location {
        __typename
        name
        organization
        address
        city
        latitude
        longitude
      }
    }
    totalCount
  }
}
