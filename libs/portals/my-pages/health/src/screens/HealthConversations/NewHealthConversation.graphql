fragment HealthConversationRecipient on HealthDirectorateHealthConversationRecipient {
  nodeId
  groupId
  name
  allowsMessaging
  messagingWindowOpen
  messagingWindowClose
  patientReplyWindowDays
  canCreateConversation
  conversationBlockedReason
  allowedMessageTypes {
    patientInitiatedTypeCode
    title
    isCertificate
  }
}

query GetHealthConversationRecipientsForNew($locale: LocaleEnum) {
  healthDirectorateHealthConversationRecipients(locale: $locale) {
    ...HealthConversationRecipient
  }
}

mutation CreateHealthConversation(
  $input: HealthDirectorateCreateConversationInput!
) {
  healthDirectorateCreateHealthConversation(input: $input) {
    id
  }
}
