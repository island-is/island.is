query studentInfo($input: UniversityCareersStudentInfoInput!) {
  universityCareersStudentTrackHistory(input: $input) {
    __typename
    transcripts {
      name
      nationalId
      graduationDate
      trackNumber
      institution {
        id
        displayName
        logoUrl
      }
      school
      faculty
      studyProgram
      degree
      level
    }
    errors {
      institution {
        id
        displayName
      }
      error
    }
  }
}
