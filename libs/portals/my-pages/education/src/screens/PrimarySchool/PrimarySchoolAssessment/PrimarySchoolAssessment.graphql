query PrimarySchoolAssessmentData($studentId: String!, $locale: LocaleEnum) {
  primarySchoolStudent(studentId: $studentId) {
    assessmentHistory(locale: $locale) {
      id
      name
    }
  }
}

query PrimarySchoolAssessmentResults(
  $studentId: String!
  $assessmentId: String!
  $locale: LocaleEnum
) {
  primarySchoolStudent(studentId: $studentId) {
    assessmentHistory(assessmentId: $assessmentId, locale: $locale) {
      id
      resultHistory {
        id
        schoolYear
        grade {
          level
          name
        }
        period {
          monthNumber
        }
        downloadServiceUrl
      }
    }
  }
}
