query getPersonalTaxCredit {
  socialInsurancePersonalTaxCredit {
    taxCards {
      percentage
      validFrom
      validTo
      taxCardType
    }
    canEdit
    canDiscontinue
    registrationMonthsAndYears {
      year
      months
    }
    discontinuingMonthsAndYears {
      year
      months
    }
    spouseEligibility {
      canApply
      reasonNotAllowed
      allowedYearMonths {
        year
        months
      }
    }
  }
}

mutation registerSocialInsuranceTaxCardAllowance(
  $input: SocialInsuranceRegisterTaxCardAllowanceInput!
) {
  registerSocialInsuranceTaxCardAllowance(input: $input)
}

mutation updateSocialInsuranceTaxCardAllowance(
  $input: SocialInsuranceUpdateTaxCardAllowanceInput!
) {
  updateSocialInsuranceTaxCardAllowance(input: $input)
}

mutation discontinueSocialInsuranceTaxCardAllowance(
  $input: SocialInsuranceDiscontinueTaxCardAllowanceInput!
) {
  discontinueSocialInsuranceTaxCardAllowance(input: $input)
}

mutation setSocialInsuranceSpouseTaxCard {
  setSocialInsuranceSpouseTaxCard
}

mutation setSocialInsuranceSpouseTaxCardDueToDeath(
  $input: SocialInsuranceSetSpouseTaxCardDueToDeathInput!
) {
  setSocialInsuranceSpouseTaxCardDueToDeath(input: $input)
}
