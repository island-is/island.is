query getApplicantRequestedAttachments {
  vmstApplicantRequestedAttachments {
    id
    dataRequestId
    attachmentId
    attachmentTypeId
  }
}

query getApplicantAvailableActions {
  vmstApplicantAvailableActions {
    canContact
    canSubmitDocuments
    canReportWork
    canReportTravel
    canUnregister
    canConfirmJobSearch
  }
}

query getAttachmentTypes {
  vmstAttachmentTypes {
    success
    errorMessage
    attachmentTypes {
      id
      name
      english
    }
  }
}

query getAttachment($id: String!) {
  vmstAttachment(id: $id) {
    id
    name
    contentType
    created
    data
    size
  }
}
