query getUnemploymentApplicationOverview {
  vmstApplicationsUnemploymentApplicationOverview {
    applicantId
    unemploymentApplicationId
    applicationStatusId
    applicationStatusName
    dataRequested
    availableActions {
      canContact
      canSubmitDocuments
      canReportWork
      canReportTravel
      canUnregister
      canConfirmJobSearch
    }
    overviewItems {
      key
      label
      value
    }
  }
}
