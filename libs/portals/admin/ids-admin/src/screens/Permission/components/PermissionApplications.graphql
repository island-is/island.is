query GetScopeClients($input: ScopeClientsInput!) {
  authAdminScopeClients(input: $input) {
    clientId
    tenantId
    clientType
    displayName {
      value
      locale
    }
  }
}

query GetGrantableClients($input: AuthAdminGrantableClientsInput!) {
  authAdminGrantableClients(input: $input) {
    clientId
    tenantId
    clientType
    displayName {
      value
      locale
    }
  }
}

mutation UpdateScopeClients($input: UpdateAuthAdminScopeClientsInput!) {
  updateAuthAdminScopeClients(input: $input) {
    environments
    failedEnvironments {
      environment
      message
    }
  }
}
