query GetScopeClients($input: ScopeClientsInput!) {
  authAdminScopeClients(input: $input) {
    clientId
    clientType
    displayName {
      value
      locale
    }
  }
}

query GetClientsByTenants($input: AuthAdminClientsByTenantsInput!) {
  authAdminClientsByTenants(input: $input) {
    data {
      tenantId
      data {
        clientId
        clientType
        defaultEnvironment {
          tenantId
          clientId
          clientType
          displayName {
            value
            locale
          }
        }
      }
    }
  }
}

mutation UpdateScopeClients($input: UpdateAuthAdminScopeClientsInput!) {
  updateAuthAdminScopeClients(input: $input) {
    environments
    failedEnvironments {
      environment
      message
    }
  }
}
