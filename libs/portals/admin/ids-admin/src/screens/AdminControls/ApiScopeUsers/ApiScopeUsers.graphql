query GetApiScopeUsers($input: AuthAdminApiScopeUsersInput!) {
  authAdminApiScopeUsers(input: $input) {
    rows {
      nationalId
      name
      email
      availableEnvironments
    }
    totalCount
  }
}

query GetAccessControlledScopes($environment: AuthAdminEnvironment) {
  authAdminAccessControlledScopes(environment: $environment) {
    name
    displayName
    description
  }
}

query GetConfiguredEnvironments {
  authAdminApiScopeUserConfiguredEnvironments
}

query GetApiScopeUser($nationalId: String!) {
  authAdminApiScopeUser(nationalId: $nationalId) {
    nationalId
    availableEnvironments
    environments {
      environment
      nationalId
      name
      email
      userAccess {
        nationalId
        scope
      }
    }
  }
}

mutation CreateApiScopeUser($input: CreateAuthAdminApiScopeUserInput!) {
  createAuthAdminApiScopeUser(input: $input) {
    nationalId
    availableEnvironments
    environments {
      environment
      nationalId
      name
      email
      userAccess {
        nationalId
        scope
      }
    }
    failedEnvironments {
      environment
      message
    }
  }
}

mutation UpdateApiScopeUser($input: UpdateAuthAdminApiScopeUserInput!) {
  updateAuthAdminApiScopeUser(input: $input) {
    nationalId
    availableEnvironments
    environments {
      environment
      nationalId
      name
      email
      userAccess {
        nationalId
        scope
      }
    }
    failedEnvironments {
      environment
      message
    }
  }
}

mutation DeleteApiScopeUser($input: DeleteAuthAdminApiScopeUserInput!) {
  deleteAuthAdminApiScopeUser(input: $input) {
    success
    deletedEnvironments
    failedEnvironments {
      environment
      message
    }
  }
}
