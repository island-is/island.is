query GetLanguages($input: AuthAdminLanguagesInput!) {
  authAdminLanguages(input: $input) {
    rows {
      isoKey
      description
      englishDescription
      availableEnvironments
    }
    totalCount
  }
}

query GetLanguage($isoKey: String!) {
  authAdminLanguage(isoKey: $isoKey) {
    isoKey
    availableEnvironments
    environments {
      environment
      isoKey
      description
      englishDescription
    }
  }
}

query GetLanguageConfiguredEnvironments {
  authAdminLanguageConfiguredEnvironments
}

mutation CreateLanguage($input: CreateAuthAdminLanguageInput!) {
  createAuthAdminLanguage(input: $input) {
    isoKey
    availableEnvironments
    environments {
      environment
      isoKey
      description
      englishDescription
    }
    failedEnvironments {
      environment
      message
    }
  }
}

mutation UpdateLanguage($input: UpdateAuthAdminLanguageInput!) {
  updateAuthAdminLanguage(input: $input) {
    isoKey
    availableEnvironments
    environments {
      environment
      isoKey
      description
      englishDescription
    }
    failedEnvironments {
      environment
      message
    }
  }
}

mutation DeleteLanguage($input: DeleteAuthAdminLanguageInput!) {
  deleteAuthAdminLanguage(input: $input) {
    success
    affectedEnvironments
    failedEnvironments {
      environment
      message
    }
  }
}
