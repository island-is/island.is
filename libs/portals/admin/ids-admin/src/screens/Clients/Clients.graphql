# Get Clients by TenantId
query GetClients($input: AuthAdminClientsInput!) {
  authAdminClients(input: $input) {
    data {
      clientId
      clientType
      archived
      availableEnvironments
      defaultEnvironment {
        id
        environment
        clientId
        sso
        displayName {
          locale
          value
        }
      }
    }
  }
}
