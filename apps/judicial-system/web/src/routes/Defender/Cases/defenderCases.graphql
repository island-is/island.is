query DefenderCases($input: CaseListQueryInput) {
  cases(input: $input) {
    id
    type
    state
    courtDate
    policeCaseNumbers
    defendants {
      id
      defenderNationalId
      nationalId
      name
      noNationalId
      isAlternativeService
      isDefenderChoiceConfirmed
      subpoenas {
        id
        serviceStatus
      }
      verdict {
        id
        isDefaultJudgement
      }
      indictmentCancelledOrDismissedState {
        type
        time
      }
    }
    courtCaseNumber
    decision
    validToDate
    isValidToDateInThePast
    initialRulingDate
    rulingDate
    accusedPostponedAppealDate
    parentCaseId
    appealCaseId
    appealState
    appealCaseNumber
    appealRulingDecision
    appealedByDefendantId
    appealedByCivilClaimantId
    postponedIndefinitelyExplanation
    indictmentDecision
    indictmentRulingDecision
    courtSessionType
    caseSentToCourtDate
  }
}
